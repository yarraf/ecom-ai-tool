name: CI — Build & Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build Frontend ─────────────────────────────────────────────
  build-client:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build
        run: cd client && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # ── Check Backend ──────────────────────────────────────────────
  check-server:
    name: Check Backend (Node/Express)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Verify server starts
        run: |
          cd server
          timeout 5 node index.js &
          sleep 3
          curl -sf http://localhost:3001/api/health && echo "✅ Server OK"
        env:
          OPENROUTER_API_KEY: ${{ secrets.ECOM_AI_TOOL_API_KEY }}
          PORT: 3001
