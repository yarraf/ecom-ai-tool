name: CI — Build & Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'          # déclenche sur v1.0.0, v1.2.3...
  pull_request:
    branches: [main]

jobs:
  # ── Build Frontend ─────────────────────────────────────────────
  build-client:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build
        run: cd client && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ github.ref_name }}

  # ── Check Backend ──────────────────────────────────────────────
  check-server:
    name: Check Backend (Node/Express)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Verify server starts
        run: |
          cd server
          timeout 5 node index.js &
          sleep 3
          curl -sf http://localhost:3001/api/health && echo "✅ Server OK"
        env:
          OPENROUTER_API_KEY: ${{ secrets.ECOM_AI_TOOL_API_KEY }}
          PORT: 3001

  # ── Release GitHub (uniquement sur tag) ───────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-client, check-server]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## ${{ github.ref_name }}

            ### Déploiements
            - 🌐 **Frontend** : Vercel (auto-déployé)
            - ⚙️ **Backend**  : Railway (auto-déployé)

            ### Changements
            Voir les commits depuis la version précédente.
          draft: false
          prerelease: false
